# Builds 5 Node SEA binaries on tagged releases (v*) and attaches them
# to the GitHub Release. macOS targets are Developer-ID-signed and
# notarized via xcrun notarytool. SHA-256 sums for every artifact land
# alongside the binaries in a SHA256SUMS file (the Homebrew tap reads
# hashes from there).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Must already exist on origin."
        required: true

permissions:
  contents: write # to create the GitHub Release + upload assets

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            runner: macos-14 # Apple silicon runner
            platform: darwin
            arch: arm64
            output: quire-darwin-arm64
            sign: true
          - name: darwin-x64
            runner: macos-14 # cross-compile from Apple silicon — macos-13 Intel pool has long queue times.
            platform: darwin
            arch: x64
            output: quire-darwin-x64
            sign: true
          - name: linux-x64
            runner: ubuntu-latest
            platform: linux
            arch: x64
            output: quire-linux-x64
            sign: false
          - name: linux-arm64
            runner: ubuntu-latest
            platform: linux
            arch: arm64
            output: quire-linux-arm64
            sign: false
          - name: win-x64
            runner: ubuntu-latest # cross-compile from Linux; pkg of OS for SEA isn't needed
            platform: win32
            arch: x64
            output: quire-win-x64.exe
            sign: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck + tests
        run: |
          npm run typecheck
          npm test

      # `npm run package` downloads the official Node binary for the
      # target platform/arch via build-sea.mjs (homebrew Node lacks the
      # SEA fuse, so we never trust the runner's Node for the template).
      - name: Build SEA binary
        run: |
          node scripts/build-sea.mjs \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --output ${{ matrix.output }}

      # ---- macOS only: import Developer ID cert, sign, notarize -----
      # Gated on the secret being non-empty so we can ship unsigned binaries
      # before Apple Developer ID enrollment is complete. Unsigned macOS
      # binaries trip Gatekeeper on first launch — acceptable for a smoke
      # test, but flip the secret to enable real distribution.
      - name: Check for signing secrets (macOS)
        if: matrix.sign
        id: signing_check
        env:
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
        run: |
          if [ -n "$APPLE_DEVELOPER_ID_CERT" ]; then
            echo "do_sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::APPLE_DEVELOPER_ID_CERT not set — uploading an unsigned macOS binary. Gatekeeper will block first launch until the user approves it manually."
            echo "do_sign=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate + notarytool credentials (macOS)
        if: matrix.sign && steps.signing_check.outputs.do_sign == 'true'
        env:
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Import the base64-encoded p12 into a fresh keychain so the
          # private key is unlocked for `codesign`. The keychain is
          # ephemeral (lives only for this job).
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_DEVELOPER_ID_CERT" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed -e 's/[\"\"]//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Stash the notarytool credentials in the same ephemeral keychain
          # under a named profile. The submit step then references the
          # profile instead of passing --apple-id/--password/--team-id on
          # argv each call. Argv exposure of $APPLE_APP_PASSWORD shrinks
          # from the duration of the notarization wait (potentially several
          # minutes) to this single store-credentials call (~1 second).
          xcrun notarytool store-credentials "quire-notarize" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$KEYCHAIN_PATH"

      - name: Codesign + notarize (macOS)
        if: matrix.sign && steps.signing_check.outputs.do_sign == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BIN="dist-bin/${{ matrix.output }}"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"

          # Re-sign over the ad-hoc signature build-sea.mjs leaves behind.
          # `--options runtime` enables the hardened runtime, required
          # for notarization.
          codesign --force \
            --sign "Developer ID Application: $APPLE_TEAM_ID" \
            --options runtime \
            --timestamp \
            "$BIN"

          # notarytool needs a container — zip the bare binary.
          ZIP="$RUNNER_TEMP/${{ matrix.output }}.zip"
          ditto -c -k --keepParent "$BIN" "$ZIP"

          # Submit using the stored profile from the previous step (no
          # --apple-id / --password / --team-id on argv during the wait).
          xcrun notarytool submit "$ZIP" \
            --keychain-profile "quire-notarize" \
            --keychain "$KEYCHAIN_PATH" \
            --wait

          # Stapling a bare binary isn't supported (only .app/.dmg/.pkg).
          # The notarization ticket is fetched on first run if the user
          # is online — acceptable for a CLI; revisit if users complain.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist-bin/${{ matrix.output }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + compute SHA256SUMS
        run: |
          mkdir -p dist-bin
          # Each artifact lands in its own subdir matching the artifact
          # name; flatten them into dist-bin/.
          find artifacts -mindepth 2 -maxdepth 2 -type f -exec mv {} dist-bin/ \;
          chmod +x dist-bin/quire-darwin-* dist-bin/quire-linux-* || true
          ls -lh dist-bin/

          (cd dist-bin && shasum -a 256 quire-* > SHA256SUMS)
          cat dist-bin/SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          NOTES="Automated release of $TAG. See [CHANGES.md](https://github.com/${{ github.repository }}/blob/$TAG/CHANGES.md) for details."
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --verify-tag \
            dist-bin/quire-darwin-arm64 \
            dist-bin/quire-darwin-x64 \
            dist-bin/quire-linux-x64 \
            dist-bin/quire-linux-arm64 \
            dist-bin/quire-win-x64.exe \
            dist-bin/SHA256SUMS

  # Open a bump PR against the quire-io/homebrew-quire tap so `brew upgrade
  # quire` picks up the new release. The PR is opened on a per-version
  # branch; merge it manually (or enable auto-merge on the tap repo) so
  # the version + four URL/sha256 pairs actually land on main.
  #
  # We rewrite the formula ourselves via scripts/update-homebrew-formula.py
  # rather than `brew bump-formula-pr` (used by
  # dawidd6/action-homebrew-bump-formula) because that tool is single-URL
  # by design — it only bumps the URL matching the host platform of the
  # runner. v0.1.2's auto-bump shipped only the linux-x64 entry as a
  # result, leaving mac/linux-arm64 users on v0.1.1 binaries.
  #
  # The secret HOMEBREW_TAP_PUSH_TOKEN must be a classic PAT with `repo`
  # scope (fine-grained PATs are not enough — `git push` to the tap and
  # `gh pr create` both need full repo access on quire-io/homebrew-quire).
  bump-tap:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout quire-cli (for the bump script)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: quire-io/homebrew-quire
          token: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          path: tap

      - name: Download SHA256SUMS from this release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern SHA256SUMS

      - name: Rewrite formula
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          python3 scripts/update-homebrew-formula.py \
            tap/Formula/quire.rb "$VERSION" SHA256SUMS
          echo "--- diff ---"
          git -C tap diff Formula/quire.rb

      - name: Commit, push, open PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          VERSION="${TAG#v}"
          BRANCH="bump-quire-$VERSION"
          git checkout -b "$BRANCH"
          git add Formula/quire.rb
          git commit -m "quire $VERSION"
          # --force-with-lease makes workflow re-runs (e.g. retrying after a
          # transient failure) idempotent: if the branch already exists from
          # a prior run we own, overwrite it; if someone else has pushed in
          # the meantime, fail loudly.
          git push origin "$BRANCH" --force-with-lease --set-upstream

          if PR_NUM=$(gh pr view "$BRANCH" --repo quire-io/homebrew-quire --json number --jq .number 2>/dev/null); then
            echo "PR #$PR_NUM already exists for $BRANCH — updated via force-push."
          else
            gh pr create \
              --repo quire-io/homebrew-quire \
              --base main \
              --head "$BRANCH" \
              --title "quire $VERSION" \
              --body "Automated bump for $TAG. All four platform binaries updated from SHA256SUMS."
          fi
